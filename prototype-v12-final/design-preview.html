<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <title>სამეზობლოს — ვიზუალური პრევიუ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="theme.css" />
  <style>
    body { font-family: var(--font); background: #e7e5e4; padding: 32px 16px; }
    h1 { text-align: center; color: var(--primary-dark); font-size: 1.25rem; }
    p.sub { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin: 8px 0 28px; }
    .grid { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; max-width: 1280px; margin: 0 auto; }
    .frame label { display: block; text-align: center; font-size: 0.75rem; font-weight: 600; color: var(--primary); margin-bottom: 8px; }
    iframe { width: 390px; height: 844px; border: none; border-radius: 44px; box-shadow: var(--shadow-lg); background: var(--bg); }
    .note { text-align: center; margin-top: 32px; font-size: 0.8rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <h1>სამეზობლოს — საკუთარი ვიზუალი</h1>
  <p class="sub">გასაზიარებელი პრევიუ · ინტერაქტიული ვერსია: index.html</p>
  <div class="grid">
    <div class="frame"><label>მთავარი</label><iframe src="index.html" title="home"></iframe></div>
  </div>
  <p class="note">გახსენი <strong>index.html</strong> ეკრანების გადასართავად (მენიუდან ზედა ღილაკები)</p>
  <script>/* single iframe loads full app — use index.html directly for best experience */</script>
</body>
</html>
